<mat-card class="controller-card">
  <mat-card-content class="controller-card__content">
    <header class="controller-card__header">
      <div class="controller-card__identity">
        <div class="controller-card__icon">
          <span class="material-symbols-outlined">developer_board</span>
        </div>

        <div class="controller-card__heading">
          <h2 class="controller-card__title">
            {{ controller().name }}
          </h2>

          <p class="controller-card__subtitle">
            {{ controller().controllerKey }}
          </p>
        </div>
      </div>

      <span
        class="controller-card__status-badge"
        [class.controller-card__status-badge--empty]="controller().statusLabel === 'Empty'"
        [class.controller-card__status-badge--configured]="
          controller().statusLabel === 'Configured'
        "
        [class.controller-card__status-badge--inactive]="controller().statusLabel === 'Inactive'"
      >
        {{ controller().statusLabel }}
      </span>
    </header>

    <section class="controller-card__summary">
      <div class="summary-item">
        <div class="summary-item__icon">
          <span class="material-symbols-outlined">location_on</span>
        </div>

        <div>
          <p class="summary-item__label">Location</p>
          <p class="summary-item__value">
            {{ controller().location || 'No location assigned' }}
          </p>
        </div>
      </div>

      <div class="summary-divider"></div>

      <div class="summary-item">
        <div class="summary-item__icon">
          <span class="material-symbols-outlined">sensors</span>
        </div>

        <div>
          <p class="summary-item__label">Sensors</p>
          <p class="summary-item__value">
            {{ controller().sensorCount }}
          </p>
        </div>
      </div>
    </section>

    <footer class="controller-card__footer d-flex justify-content-between">
      <button
        mat-raised-button
        type="button"
        class="controller-card__action"
        [routerLink]="['/dashboard/controller', controller().id]"
        [disabled]="controller().sensorCount === 0"
        title="View controller sensors"
      >
        Details
      </button>

      <button mat-raised-button type="button" class="controller-card__edit">Edit</button>
    </footer>
  </mat-card-content>
</mat-card>
