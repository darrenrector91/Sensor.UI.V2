<div class="overview-card d-flex align-items-center gap-3">
  <div class="overview-card-icon" [ngClass]="card.statusClass">
    <i class="bi" [ngClass]="card.icon"></i>
  </div>

  <div>
    <div class="overview-card-label">{{ card.label }}</div>
    <div class="overview-card-primary">{{ card.primaryText }}</div>

    @if (card.secondaryText) {
      <div class="overview-card-secondary">
        {{ card.secondaryText }}
      </div>
    }
  </div>
</div>
