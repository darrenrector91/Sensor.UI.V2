<header class="scoped-dashboard-header">
  <div>
    <a class="back-link" routerLink="/">← Back to dashboard</a>

    <h1>{{ title() }}</h1>
    <p>{{ subtitle() }}</p>

    @if (latestUpdatedUtc(); as updatedUtc) {
      <div class="last-updated">
        Last updated {{ updatedUtc | date:'short' }}
      </div>
    }
  </div>

  <div class="scoped-dashboard-header__actions">
    <div class="scoped-dashboard-header__range">
      <span>Chart Range</span>
      <small>Showing recent history for charts and summaries</small>

      <app-scoped-time-range-selector
        [selectedRange]="selectedTimeRange()"
        (rangeSelected)="selectTimeRange($event)"
      ></app-scoped-time-range-selector>
    </div>

    <button class="btn btn-outline-light scoped-dashboard-header__refresh" type="button" (click)="refresh()" [disabled]="isLoading()">
      Refresh
    </button>
  </div>
</header>
