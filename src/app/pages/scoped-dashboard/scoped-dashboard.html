<section class="scoped-dashboard">
  <app-scoped-dashboard-header
    [title]="title()"
    [subtitle]="subtitle()"
    [latestUpdatedUtc]="latestUpdatedUtc()"
    [isLoading]="isLoading()"
    [selectedTimeRange]="selectedTimeRange()"
    (refreshRequested)="loadMeasurements()"
    (timeRangeSelected)="selectTimeRange($event)"
  ></app-scoped-dashboard-header>

  @if (isLoading()) {
    <div class="dashboard-status">Loading scoped dashboard...</div>
  }

  @if (errorMessage()) {
    <div class="dashboard-error">{{ errorMessage() }}</div>
  }

  @if (!isLoading() && !errorMessage() && filteredMeasurements().length === 0) {
    <div class="dashboard-empty">{{ emptyStateMessage() }}</div>
  }

  <app-scoped-latest-measurements
    [measurements]="latestMeasurements()"
  ></app-scoped-latest-measurements>

  <app-scoped-health-summary
    [measurements]="filteredMeasurements()"
    [latestUpdatedUtc]="latestUpdatedUtc()"
  ></app-scoped-health-summary>

  <div class="sensor-grid">
    @for (sensor of groupedSensors(); track sensor.sensorId) {
      <app-scoped-measurement-panel [sensor]="sensor"></app-scoped-measurement-panel>
    }
  </div>
</section>
