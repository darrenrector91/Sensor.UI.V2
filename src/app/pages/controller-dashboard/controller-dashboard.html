<div class="ms-2 mb-4">
  <div class="row">
    <div class="col-6 d-flex align-item-center justify-content-start">
      <div class="kicker">Environmental Controller Dashboard</div>
    </div>
    <div class="col-6 d-flex align-item-center justify-content-end">
      <div class="isUnassignVisible">
        <section class="unassigned-wrapper">
          <span class="unassigned-list">
            <mat-checkbox class="mat-checkbox" (change)="setControllerVisibility($event.checked)">
              Show Unassigned Controllers
            </mat-checkbox>
          </span>
        </section>
      </div>
    </div>
  </div>
</div>

@if (isLoading()) {
  <div class="dashboard-status">
    <span>Loading dashboard...</span>
  </div>
}

@if (errorMessage()) {
  <div class="dashboard-error">
    {{ errorMessage() }}
  </div>
}

<div class="row g-3">
  @for (controller of controllers(); track controller.controllerKey) {
    <div class="col-12 col-lg-6 col-xxl-4">
      <app-controller-card class="d-block h-100" [controller]="controller"></app-controller-card>
    </div>
  }
</div>
