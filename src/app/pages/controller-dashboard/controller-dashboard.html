<div class="controller-page">
  <div class="container-fluid py-4 px-4">
    <div class="row align-items-center mb-4">
      <div class="col-12 d-flex align-items-center justify-content-between gap-3">
        <div>
          <div class="kicker">Environmental Sensor Dashboard</div>
          <div class="dashboard-subtitle">Controller overview from live sensor measurements.</div>
        </div>

        <button
          class="btn btn-outline-light"
          type="button"
          (click)="loadMeasurements()"
          [disabled]="isLoading()"
        >
          Refresh
        </button>
      </div>
    </div>

    @if (isLoading()) {
      <div class="dashboard-status">
        <span>Loading dashboard...</span>
      </div>
    }

    @if (errorMessage()) {
      <div class="dashboard-error">
        {{ errorMessage() }}
      </div>
    }

    <div class="row g-3">
      @for (controller of controllers(); track controller.controllerKey) {
        <div class="col-12 col-lg-6 col-xxl-4">
          <app-controller-card
            class="d-block h-100"
            [controller]="controller"
          ></app-controller-card>
        </div>
      }
    </div>
  </div>
</div>
